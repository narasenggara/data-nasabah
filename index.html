<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGI Ibrahim Adjie — Data Gadai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1e6fa8;--blue-mid:#2d8fd4;--blue-light:#e8f4fd;--blue-dark:#14527e;--blue-pale:#f0f7ff;
  --navy:#1a3a52;--bg:#eef4fb;--card:#ffffff;--border:#cce0f0;
  --text:#1a2d3d;--muted:#5a7a94;
  --gold:#c9930a;--gold-light:#fef9eb;
  --danger:#dc2626;--danger-light:#fef2f2;
  --green:#1a8c4e;--green-light:#e8f8ef;
  --orange:#c2600a;--orange-light:#fff4ed;
  --radius:14px;--radius-sm:9px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:0 28px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(30,111,168,0.25)}
.logo-badge{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:#fff;font-weight:700;font-size:13px;padding:5px 11px;border-radius:7px;letter-spacing:.5px}
header h1{color:#fff;font-size:15px;font-weight:600}
.header-sub{color:rgba(255,255,255,0.55);font-size:13px;margin-left:auto}
.container{max-width:1160px;margin:0 auto;padding:24px 20px}
.top-grid{display:grid;grid-template-columns:370px 1fr;gap:20px;align-items:start}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 6px rgba(30,111,168,0.07)}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--blue-pale)}
.panel-header h2{font-size:14px;font-weight:700;color:var(--navy)}
.panel-body{padding:18px}
textarea{width:100%;height:160px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;font-family:'Fira Mono',monospace;font-size:11.5px;color:var(--text);background:#f7fbff;resize:vertical;transition:border-color .15s;line-height:1.65}
textarea:focus{outline:none;border-color:var(--blue-mid);background:#fff}
.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn-blue{background:var(--blue);color:#fff;width:100%;margin-top:10px}
.btn-blue:hover{background:var(--blue-dark)}
.btn-blue:disabled{background:#9ca3af;cursor:not-allowed}
.btn-sm{padding:7px 14px;font-size:12px;font-weight:600}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{background:#1ebe5d}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.alert{display:none;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:10px}
.alert.show{display:block}
.alert-error{background:var(--danger-light);border:1px solid #fecaca;color:var(--danger)}
.alert-success{background:var(--green-light);border:1px solid #a8d8b8;color:#145a32}
.preview-grid{display:flex;flex-direction:column}
.prow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--blue-pale)}
.prow:last-child{border-bottom:none}
.prow .lbl{color:var(--muted);flex-shrink:0;min-width:100px}
.prow .val{font-weight:600;text-align:right;color:var(--text);font-size:12px}
.val-blue{color:var(--blue)!important;font-size:13px!important}

/* ACTION BUTTONS after parse */
.action-buttons{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.btn-action{width:100%;padding:10px 14px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s}
.btn-action-sheet{background:var(--blue);color:#fff}
.btn-action-sheet:hover{background:var(--blue-dark)}
.btn-action-sheet:disabled{background:#9ca3af;cursor:not-allowed}
.btn-action-perpanjang{background:var(--orange-light);color:var(--orange);border:1.5px solid #f5c49a}
.btn-action-perpanjang:hover{background:#ffe4cc}
.btn-action-lunas{background:var(--green-light);color:var(--green);border:1.5px solid #a8d8b8}
.btn-action-lunas:hover{background:#d2f0df}

/* SEARCH BAR */
.search-bar{padding:10px 14px 0;background:var(--blue-pale)}
.search-bar input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;color:var(--text);background:#fff;outline:none}
.search-bar input:focus{border-color:var(--blue-mid)}

/* PP / PL buttons */
.btn-pp{background:var(--orange-light);color:var(--orange);border:1.5px solid #f5c49a;font-size:11px;padding:5px 9px}
.btn-pp:hover{background:#ffe4cc}
.btn-pl{background:var(--green-light);color:var(--green);border:1.5px solid #a8d8b8;font-size:11px;padding:5px 9px}
.btn-pl:hover{background:#d2f0df}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;padding:10px 14px;background:var(--blue-pale);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-bar input[type=date],.filter-bar select{padding:6px 9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:12px;color:var(--text);background:#fff;outline:none}
.filter-bar input[type=date]:focus,.filter-bar select:focus{border-color:var(--blue-mid)}
.filter-bar label{font-size:11.5px;color:var(--muted);font-weight:600}
.btn-reset{padding:6px 10px;font-size:11.5px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);cursor:pointer;font-family:inherit}
.btn-reset:hover{border-color:var(--danger);color:var(--danger)}
.filter-count{font-size:12px;color:var(--blue);font-weight:600}

/* PAGINATION */
.pagination-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);background:var(--blue-pale);font-size:12px;color:var(--muted);flex-wrap:wrap;gap:8px}
.page-size-picker{display:flex;align-items:center;gap:6px;font-size:12px}
.page-size-picker label{color:var(--muted);font-weight:600}
.page-size-btn{padding:4px 10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.page-size-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.page-nav{display:flex;align-items:center;gap:6px}
.page-nav button{padding:4px 10px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
.page-nav button:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.page-nav button:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-weight:600;color:var(--text)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--blue-light);border-bottom:2px solid #b3d4ea}
th{padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--blue-dark);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#d5eaf7}
th .sort-icon{margin-left:4px;opacity:.4;font-size:10px}
th.sort-asc .sort-icon::after{content:'▲';opacity:1}
th.sort-desc .sort-icon::after{content:'▼';opacity:1}
th .sort-icon::after{content:'⇅'}
td{padding:10px 12px;border-bottom:1px solid #eef4fb;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f9ff}
.td-faktur{font-family:'Fira Mono',monospace;font-size:11.5px;color:var(--muted)}
.td-nama{font-weight:600;color:var(--text)}
.td-hp{color:var(--blue);font-size:12px}
.td-tgl{font-size:12px;color:var(--muted)}
.wa-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.wa-belum{background:#fef9eb;color:#92400e;border:1px solid #fcd34d}
.wa-sudah{background:var(--green-light);color:#145a32;border:1px solid #a8d8b8}
.wa-notdaftar{background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state .eicon{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:13px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.spinner-dark{border-color:rgba(0,0,0,.15);border-top-color:currentColor}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,50,80,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:480px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--navy)}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:12px}
/* Tipe tabs inside modal */
.tipe-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--blue-pale);padding:4px;border-radius:var(--radius-sm)}
.tipe-tab{flex:1;padding:7px 6px;border:none;background:transparent;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center}
.tipe-tab.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.template-box{background:#f7fbff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;margin-bottom:14px;max-height:220px;overflow-y:auto}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap}
.modal-actions .btn{flex:1}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:0 1px 4px rgba(30,111,168,0.07)}
.stat-card .s-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.stat-card .s-val{font-size:22px;font-weight:700;color:var(--text)}
.stat-card.blue .s-val{color:var(--blue)}
.stat-card.gold .s-val{color:var(--gold)}
.stat-card.green .s-val{color:var(--green)}
@media(max-width:800px){.top-grid{grid-template-columns:1fr}.stats-row .stat-card{min-width:80px}}

/* LOGIN SCREEN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,var(--blue-mid) 100%);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px}
#loginScreen.hide{display:none}
.login-card{background:#fff;border-radius:18px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(10,40,70,.35)}
.login-logo{text-align:center;margin-bottom:6px}
.login-logo .badge{display:inline-block;background:var(--blue);color:#fff;font-weight:700;font-size:15px;padding:7px 16px;border-radius:9px;letter-spacing:.5px}
.login-card h2{text-align:center;font-size:17px;font-weight:700;color:var(--navy);margin:14px 0 4px}
.login-card .sub{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:22px}
.cabang-options{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.cabang-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#f7fbff;cursor:pointer;transition:all .15s;text-align:left;font-family:inherit}
.cabang-btn:hover{border-color:var(--blue-mid);background:var(--blue-pale)}
.cabang-btn.selected{border-color:var(--blue);background:var(--blue-light)}
.cabang-icon{width:38px;height:38px;border-radius:9px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.cabang-info .c-name{font-weight:700;font-size:13.5px;color:var(--text)}
.cabang-info .c-code{font-size:11.5px;color:var(--muted)}
.login-pass-wrap{display:none;margin-top:4px}
.login-pass-wrap.show{display:block}
.login-pass-wrap label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.login-pass-wrap input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:#f7fbff;outline:none;margin-bottom:10px}
.login-pass-wrap input:focus{border-color:var(--blue-mid);background:#fff}
.login-error{display:none;background:var(--danger-light);border:1px solid #fecaca;color:var(--danger);font-size:12.5px;padding:9px 12px;border-radius:var(--radius-sm);margin-bottom:10px}
.login-error.show{display:block}
.btn-login{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-login:hover{background:var(--blue-dark)}
.btn-back{width:100%;padding:8px;background:transparent;border:none;font-family:inherit;font-size:12.5px;color:var(--muted);cursor:pointer;margin-top:8px;text-decoration:underline}
#appWrap{display:none}
#appWrap.show{display:block}
.branch-switch{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;margin-left:12px;font-family:inherit}
.branch-switch:hover{background:rgba(255,255,255,0.25)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="badge">PGI</span></div>
    <h2>Pilih Cabang</h2>
    <div class="sub">Sistem Data Gadai</div>

    <div id="step1">
      <div class="cabang-options">
        <button class="cabang-btn" id="opt-BDG026" onclick="selectCabang('BDG026')">
          <div class="cabang-icon">026</div>
          <div class="cabang-info">
            <div class="c-name">Cabang Ibrahim Adjie</div>
            <div class="c-code">BDG026</div>
          </div>
        </button>
        <button class="cabang-btn" id="opt-BDG016" onclick="selectCabang('BDG016')">
          <div class="cabang-icon">016</div>
          <div class="cabang-info">
            <div class="c-name">Cabang Pungkur</div>
            <div class="c-code">BDG016</div>
          </div>
        </button>
      </div>
    </div>

    <div id="step2" class="login-pass-wrap">
      <div class="login-error" id="loginError">⚠️ Password salah.</div>
      <label>Password — <span id="selectedCabangName"></span></label>
      <input type="password" id="passInput" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">Masuk</button>
      <button class="btn-back" onclick="backToStep1()">&#8592; Pilih cabang lain</button>
    </div>
  </div>
</div>

<div id="appWrap">
<header>
  <button class="branch-switch" onclick="logout()" style="order:99">🔁 Ganti Cabang</button>
  <div class="logo-badge">PGI</div>
  <h1 id="headerCabangName">Cabang Ibrahim Adjie</h1>
  <span class="header-sub">Data Gadai 2026</span>
</header>

<div class="container">
  <div class="stats-row">
    <div class="stat-card blue"><div class="s-lbl">Total Gadai</div><div class="s-val" id="stat-total">0</div></div>
    <div class="stat-card gold"><div class="s-lbl">Belum di WA</div><div class="s-val" id="stat-belum">0</div></div>
    <div class="stat-card green"><div class="s-lbl">Sudah di WA</div><div class="s-val" id="stat-sudah">0</div></div>
  </div>

  <div class="top-grid">
    <!-- KIRI -->
    <div>
      <div class="panel">
        <div class="panel-header"><span>➕</span><h2>Input Data</h2></div>
        <div class="panel-body">
          <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Paste Data Faktur</label>
          <textarea id="rawInput" placeholder="Paste teks data dari sistem gadai di sini..."></textarea>
          <div class="alert alert-error" id="parseError"></div>
          <div class="alert alert-success" id="parseSuccess"></div>

          <div id="previewWrap" style="display:none;margin-top:14px">
            <div class="section-title">Preview Data</div>
            <div class="preview-grid" id="previewGrid"></div>
            <div class="action-buttons">
              <button class="btn-action btn-action-sheet" id="btnKirim" onclick="kirimKeSheet()">
                <span>📤</span> Kirim ke Spreadsheet
              </button>
            </div>
          </div>

          <div id="noPreview">
            <button class="btn btn-blue" onclick="parseData()" style="margin-top:0">
              <span>🔍</span> Baca Data
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- KANAN -->
    <div>
      <div class="panel">
        <div class="panel-header" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px"><span>📋</span><h2>Daftar Gadai</h2></div>
          <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 Refresh</button>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="🔍 Cari no. faktur, nama, no. HP..." oninput="applyFilter()">
        </div>
        <div class="filter-bar">
          <label>Dari</label>
          <input type="date" id="filterFrom" onchange="applyFilter()">
          <label>Sampai</label>
          <input type="date" id="filterTo" onchange="applyFilter()">

          <button class="btn-reset" onclick="resetFilter()">✕ Reset</button>
          <span class="filter-count" id="filterCount"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th onclick="sortBy(0)" id="th-0">Tgl <span class="sort-icon"></span></th>
                <th onclick="sortBy(1)" id="th-1">No. Faktur <span class="sort-icon"></span></th>
                <th onclick="sortBy(3)" id="th-3">Nama <span class="sort-icon"></span></th>
                <th>No. HP</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="5"><div class="empty-state"><div class="eicon">⏳</div><p>Memuat data...</p></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination-bar">
          <div class="page-size-picker">
            <label>Tampilkan</label>
            <button class="page-size-btn active" id="ps-20" onclick="setPageSize(20)">20</button>
            <button class="page-size-btn" id="ps-50" onclick="setPageSize(50)">50</button>
            <button class="page-size-btn" id="ps-all" onclick="setPageSize(0)">Semua</button>
          </div>
          <div class="page-nav">
            <button id="btnPrev" onclick="changePage(-1)" disabled>&#8592; Prev</button>
            <span class="page-info" id="pageInfo">—</span>
            <button id="btnNext" onclick="changePage(1)" disabled>Next &#8594;</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL FOLLOW UP -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>💬 Follow Up WhatsApp</h3>
    <div class="modal-meta">Nasabah: <strong id="modal-nama">—</strong> &nbsp;|&nbsp; 📱 <span id="modal-hp">—</span></div>
    <div class="tipe-tabs">
      <button class="tipe-tab active" id="tab-gadai" onclick="switchTipe('gadai')">🏷️ Gadai</button>
      <button class="tipe-tab" id="tab-perpanjang" onclick="switchTipe('perpanjang')">🔄 Perpanjang</button>
      <button class="tipe-tab" id="tab-lunas" onclick="switchTipe('lunas')">✅ Pelunasan</button>
    </div>
    <div class="template-box" id="modal-template"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="copyTemplate()">📋 Salin</button>
      <button class="btn btn-wa btn-sm" onclick="kirimWA()" style="flex:2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Kirim ke WhatsApp
      </button>
    </div>
    <div id="copy-toast" style="display:none;text-align:center;font-size:12px;color:var(--green);margin-top:8px;font-weight:600"></div>
  </div>
</div>

<script>
// ---- CABANG CONFIG ----
const CABANG_CONFIG = {
  BDG026: {
    name: 'Cabang Ibrahim Adjie',
    password: 'ibrahim',
    scriptUrl: 'https://script.google.com/macros/s/AKfycbyNwzUe3Yw5-Q8AJrmDYm-WtqLREC6WWNlAC1Qqn_gZM9cVdpfsJihf3XaIY1gySzvKgQ/exec'
  },
  BDG016: {
    name: 'Cabang Pungkur',
    password: 'pungkur',
    scriptUrl: 'https://script.google.com/macros/s/AKfycbzRIEoVK8716IwgSxzNNbScgq4vw9INNIMFjlQ5dfGUMkjyMTucSQrPGbjTncaIzKw/exec'
  }
};
let SCRIPT_URL = '';
let selectedCabang = null;

function selectCabang(code) {
  selectedCabang = code;
  document.querySelectorAll('.cabang-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('opt-'+code).classList.add('selected');
  document.getElementById('selectedCabangName').textContent = CABANG_CONFIG[code].name + ' ('+code+')';
  document.getElementById('step2').classList.add('show');
  document.getElementById('loginError').classList.remove('show');
  document.getElementById('passInput').value = '';
  setTimeout(()=>document.getElementById('passInput').focus(), 100);
}

function backToStep1() {
  document.getElementById('step2').classList.remove('show');
  document.querySelectorAll('.cabang-btn').forEach(b=>b.classList.remove('selected'));
  selectedCabang = null;
}

function doLogin() {
  const pass = document.getElementById('passInput').value;
  const errEl = document.getElementById('loginError');
  if (!selectedCabang) return;
  if (pass !== CABANG_CONFIG[selectedCabang].password) {
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');
  switchToCabang(selectedCabang);
  sessionStorage.setItem('pgi_cabang', selectedCabang);
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('appWrap').classList.add('show');
}

// Reset semua state data lama sebelum pindah ke cabang baru - mencegah data cabang lain bocor
function switchToCabang(code) {
  // batalkan request JSONP yang masih jalan dari cabang sebelumnya
  const oldScript = document.getElementById('_jsonp_load');
  if (oldScript) oldScript.remove();
  window._loadCallback = null;

  // reset semua data state
  allRows = [];
  filteredData = [];
  sortCol = -1; sortDir = 1;
  currentPage = 1;
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('stat-total').textContent = '0';
  document.getElementById('stat-belum').textContent = '0';
  document.getElementById('stat-sudah').textContent = '0';
  document.getElementById('filterCount').textContent = '';

  SCRIPT_URL = CABANG_CONFIG[code].scriptUrl;
  document.getElementById('headerCabangName').textContent = CABANG_CONFIG[code].name;
  loadData();
}

function logout() {
  sessionStorage.removeItem('pgi_cabang');
  // batalkan request yang masih jalan & bersihkan data biar ga kebawa ke sesi berikutnya
  const oldScript = document.getElementById('_jsonp_load');
  if (oldScript) oldScript.remove();
  window._loadCallback = null;
  allRows = [];
  filteredData = [];
  SCRIPT_URL = '';
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="eicon">⏳</div><p>Memuat data...</p></div></td></tr>';
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('appWrap').classList.remove('show');
  backToStep1();
}

// Auto-login if session exists
(function checkSession(){
  const saved = sessionStorage.getItem('pgi_cabang');
  if (saved && CABANG_CONFIG[saved]) {
    selectedCabang = saved;
    document.getElementById('loginScreen').classList.add('hide');
    document.getElementById('appWrap').classList.add('show');
    switchToCabang(saved);
  }
})();

let parsedData = null;
let currentWaData = null;
let currentTipe = 'gadai';
let allRows = [];
let filteredData = [];
let sortCol = -1, sortDir = 1;
let pageSize = 20, currentPage = 1;

// EMOJI constants (safe unicode)
const E = {
  pray:   String.fromCodePoint(0x1F64F),
  smile:  String.fromCodePoint(0x1F60A),
  pin:    String.fromCodePoint(0x1F4CD),
  pray2:  String.fromCodePoint(0x1F64F) + String.fromCodePoint(0x1F3FB),
  smiley: '\u263A\uFE0F',
  handshake: String.fromCodePoint(0x1F91C),
  raised: String.fromCodePoint(0x1F64C),
};

// TEMPLATES
function getTpl(tipe, nama) {
  if (tipe === 'gadai') {
    return 'Hai Kak ' + nama + ', terima kasih sudah melakukan gadai di PGI Cabang Ibrahim Adjie' + E.pray + '\n\n'
      + 'Semoga dana yang diterima bisa membantu kebutuhan Kakak ya ' + E.smile + '\n'
      + 'Jika ada pertanyaan terkait perpanjangan atau pelunasan, silakan hubungi kami kapan saja melalui chat ini.\n\n'
      + 'Jika ada teman atau keluarga yang membutuhkan dana cepat, boleh direkomendasikan ke PGI Cabang Ibrahim Adjie di :\n'
      + E.pin + 'Jl. Ibrahim Adjie No.296, Binong, Kec. Batununggal, Kota Bandung, Jawa Barat 40275\n\n'
      + 'Terima kasih atas kepercayaannya. ' + E.pray2 + E.smiley;
  }
  if (tipe === 'perpanjang') {
    return 'Halo Kak, terima kasih sudah melakukan perpanjangan di PGI Cabang Ibrahim Adjie ' + E.pray + '\n'
      + 'Jika ada pertanyaan terkait taksiran gadai, perpanjangan, maupun pelunasan, silakan langsung hubungi kami melalui chat ini ya Kak. Atau bisa langsung datang ke cabang kami di :\n'
      + E.pin + 'Jl. Ibrahim Adjie No.296, Binong, Kec. Batununggal, Kota Bandung, Jawa Barat 40275';
  }
  if (tipe === 'lunas') {
    return 'Hai Kak, terima kasih sudah melakukan pelunasan di PGI Cabang Ibrahim Adjie ' + E.pray + '\n'
      + 'Semoga pelayanan kami sudah sesuai harapan ya Kak ' + E.smile + '\n'
      + 'Jika ke depannya membutuhkan dana cepat atau ingin melakukan gadai kembali, silakan hubungi kami kapan saja melalui chat ini.\n'
      + 'Kami siap membantu ' + E.raised + '\n'
      + 'Atau bisa langsung datang ke cabang kami di :\n'
      + E.pin + 'Jl. Ibrahim Adjie No.296, Binong, Kec. Batununggal, Kota Bandung, Jawa Barat 40275';
  }
  return '';
}

// PARSE HELPERS
function getVal(text, key) {
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim() === key && i+1 < lines.length) {
      const v = lines[i+1].trim();
      if (v) return v;
    }
  }
  return '';
}
function extractTanggal(faktur) {
  if (!faktur || faktur.length < 11) return '';
  const s = faktur.toString();
  const yymmdd = s.substring(5,11);
  return yymmdd.substring(4,6)+'/'+yymmdd.substring(2,4)+'/20'+yymmdd.substring(0,2);
}
function formatTgl(val) {
  if (!val) return '—';
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(val.toString())) return val.toString();
  try {
    const d = new Date(val);
    if (isNaN(d)) return val.toString();
    return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
  } catch(e){ return val.toString(); }
}
function parseDMY(str) {
  if (!str||str==='—') return null;
  const p=str.split('/');
  if (p.length!==3) return null;
  return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));
}

// PARSE DATA
function parseData() {
  const raw=document.getElementById('rawInput').value.trim();
  const errEl=document.getElementById('parseError');
  const sucEl=document.getElementById('parseSuccess');
  errEl.classList.remove('show'); sucEl.classList.remove('show');
  if (!raw){errEl.textContent='⚠️ Kolom teks kosong.';errEl.classList.add('show');return;}
  const d={};
  d.noFaktur  = getVal(raw,'No. Faktur');
  d.noAnggota = getVal(raw,'No. Anggota');
  d.nama      = getVal(raw,'Nama');
  d.noHp      = getVal(raw,'No. Handphone');
  d.alamat    = getVal(raw,'Alamat');
  d.tgl       = extractTanggal(d.noFaktur);
  if (!d.nama||!d.noFaktur){errEl.textContent='⚠️ Data tidak lengkap.';errEl.classList.add('show');return;}
  parsedData=d;
  document.getElementById('previewGrid').innerHTML=
    prow('Tanggal',d.tgl,'val-blue')+prow('No. Faktur',d.noFaktur)+prow('No. Anggota',d.noAnggota)+prow('Nama',d.nama)+prow('No. HP',d.noHp)+prow('Alamat',d.alamat);
  document.getElementById('previewWrap').style.display='block';
  document.getElementById('noPreview').style.display='none';
  sucEl.textContent='✅ Data berhasil dibaca.';
  sucEl.classList.add('show');
}
function prow(l,v,cls){return '<div class="prow"><span class="lbl">'+l+'</span><span class="val '+(cls||'')+'">'+( v||'—')+'</span></div>';}

// KIRIM KE SHEET
async function kirimKeSheet() {
  if (!parsedData) return;
  const btn=document.getElementById('btnKirim');
  const errEl=document.getElementById('parseError');
  const sucEl=document.getElementById('parseSuccess');
  errEl.classList.remove('show'); sucEl.classList.remove('show');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Mengirim...';
  try {
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(parsedData)});
    const nm=parsedData.nama;
    sucEl.textContent='✅ Data '+nm+' berhasil dikirim!';
    sucEl.classList.add('show');
    document.getElementById('rawInput').value='';
    document.getElementById('previewWrap').style.display='none';
    document.getElementById('noPreview').style.display='block';
    parsedData=null;
    setTimeout(()=>loadData(),1500);
  } catch(e){errEl.textContent='❌ Gagal mengirim.';errEl.classList.add('show');}
  btn.disabled=false; btn.innerHTML='<span>📤</span> Kirim ke Spreadsheet';
}

// Open modal from action buttons (after paste)
function openModalTipe(tipe) {
  if (!parsedData) return;
  const nama = parsedData.nama;
  const hp   = parsedData.noHp;
  currentWaData = {nama, hp};
  currentTipe = tipe;
  document.getElementById('modal-nama').textContent = nama;
  document.getElementById('modal-hp').textContent   = hp;
  setTipeUI(tipe);
  document.getElementById('copy-toast').style.display='none';
  document.getElementById('modalOverlay').classList.add('show');
}

// LOAD DATA
function loadData() {
  const tbody=document.getElementById('tableBody');
  tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="eicon">⏳</div><p>Memuat data...</p></div></td></tr>';
  const old=document.getElementById('_jsonp_load');
  if(old) old.remove();
  window._loadCallback=function(json){
    allRows=json.data||[];
    applyFilter();
    const s=document.getElementById('_jsonp_load');
    if(s) s.remove();
  };
  const s=document.createElement('script');
  s.id='_jsonp_load';
  s.src=SCRIPT_URL+'?callback=_loadCallback&t='+Date.now();
  s.onerror=()=>{tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="eicon">❌</div><p>Gagal memuat data.</p></div></td></tr>';};
  document.body.appendChild(s);
}

// FILTER & SORT
function applyFilter() {
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  let data = allRows.slice(1);
  if (from) { const fromD=new Date(from); data=data.filter(r=>{const d=parseDMY(formatTgl(r[0]));return d&&d>=fromD;}); }
  if (to)   { const toD=new Date(to); toD.setHours(23,59,59); data=data.filter(r=>{const d=parseDMY(formatTgl(r[0]));return d&&d<=toD;}); }
  if (search){ data=data.filter(r=>{
    const faktur=(r[1]||'').toString().toLowerCase();
    const nama=(r[3]||'').toString().toLowerCase();
    const hp=(r[4]||'').toString().toLowerCase();
    return faktur.includes(search)||nama.includes(search)||hp.includes(search);
  }); }
  if (sortCol>=0) {
    data.sort((a,b)=>{
      let va=a[sortCol]||'',vb=b[sortCol]||'';
      if(sortCol===0){va=parseDMY(formatTgl(va))||new Date(0);vb=parseDMY(formatTgl(vb))||new Date(0);return sortDir*(va-vb);}
      return sortDir*va.toString().localeCompare(vb.toString());
    });
  } else { data.reverse(); }
  filteredData = data;
  currentPage  = 1;
  updateStats(allRows.slice(1));
  const total=allRows.slice(1).length;
  document.getElementById('filterCount').textContent = data.length!==total?'Menampilkan '+data.length+' dari '+total:'';
  renderPage();
}

function resetFilter() {
  document.getElementById('filterFrom').value='';
  document.getElementById('filterTo').value='';
  document.getElementById('searchInput').value='';
  sortCol=-1; sortDir=1;
  document.querySelectorAll('th').forEach(t=>t.className='');
  applyFilter();
}

function sortBy(col) {
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
  const map={0:'th-0',1:'th-1',3:'th-3'};
  if(map[col]) document.getElementById(map[col]).classList.add(sortDir===1?'sort-asc':'sort-desc');
  applyFilter();
}

// PAGINATION
function setPageSize(n) {
  pageSize=n; currentPage=1;
  document.querySelectorAll('.page-size-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(n===0?'ps-all':n===50?'ps-50':'ps-20').classList.add('active');
  renderPage();
}
function changePage(dir) {
  const total=pageSize===0?1:Math.ceil(filteredData.length/pageSize);
  currentPage=Math.max(1,Math.min(currentPage+dir,total));
  renderPage();
}
function renderPage() {
  let data=filteredData;
  const total=data.length;
  let pageData;
  if(pageSize===0){
    pageData=data;
    document.getElementById('pageInfo').textContent='Semua ('+total+')';
    document.getElementById('btnPrev').disabled=true;
    document.getElementById('btnNext').disabled=true;
  } else {
    const totalPages=Math.max(1,Math.ceil(total/pageSize));
    if(currentPage>totalPages) currentPage=totalPages;
    const start=(currentPage-1)*pageSize;
    pageData=data.slice(start,start+pageSize);
    document.getElementById('pageInfo').textContent='Hal '+currentPage+' / '+totalPages+' ('+total+' data)';
    document.getElementById('btnPrev').disabled=currentPage<=1;
    document.getElementById('btnNext').disabled=currentPage>=totalPages;
  }
  renderTable(pageData);
}

function updateStats(data) {
  document.getElementById('stat-total').textContent=data.length;
  document.getElementById('stat-belum').textContent=data.filter(r=>(r[9]||'').toString().toLowerCase().includes('belum')).length;
  document.getElementById('stat-sudah').textContent=data.filter(r=>(r[9]||'').toString().toLowerCase().includes('sudah')).length;
}

function renderTable(data) {
  const tbody=document.getElementById('tableBody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="eicon">📂</div><p>Tidak ada data.</p></div></td></tr>';return;}
  tbody.innerHTML=data.map(row=>{
    const tgl=formatTgl(row[0]);
    const faktur=row[1]||'—';
    const nama=row[3]||'—';
    const hp=(row[4]||'—').toString();
    const waStatus=(row[9]||'Belum di WA').toString();
    let bc='wa-belum';
    if(waStatus.toLowerCase().includes('sudah')) bc='wa-sudah';
    else if(waStatus.toLowerCase().includes('tidak')) bc='wa-notdaftar';
    return '<tr>'
      +'<td class="td-tgl">'+tgl+'</td>'
      +'<td class="td-faktur">'+faktur+'</td>'
      +'<td class="td-nama">'+nama+'</td>'
      +'<td class="td-hp">'+hp+'</td>'
      +'<td><span class="wa-badge '+bc+'">'+waStatus+'</span></td>'
      +'<td><button class="btn btn-wa btn-sm" onclick="openFollowUpRow(\''+esc(nama)+'\',\''+esc(hp)+'\')">💬 Follow Up</button></td>'
      +'</tr>';
  }).join('');
}

function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// MODAL - from table row
function openFollowUpRow(nama,hp,tipe) {
  currentWaData={nama,hp};
  currentTipe=tipe||'gadai';
  document.getElementById('modal-nama').textContent=nama;
  document.getElementById('modal-hp').textContent=hp;
  setTipeUI(currentTipe);
  document.getElementById('copy-toast').style.display='none';
  document.getElementById('modalOverlay').classList.add('show');
}

function switchTipe(tipe) {
  currentTipe=tipe;
  setTipeUI(tipe);
}

function setTipeUI(tipe) {
  ['gadai','perpanjang','lunas'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tipe);
  });
  const nama = currentWaData ? currentWaData.nama : '';
  document.getElementById('modal-template').textContent = getTpl(tipe, nama);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');currentWaData=null;}

function copyTemplate(){
  const text=document.getElementById('modal-template').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const t=document.getElementById('copy-toast');
    t.textContent='\u2705 Template tersalin!';
    t.style.display='block';
    setTimeout(()=>t.style.display='none',2000);
  });
}

function kirimWA(){
  if(!currentWaData) return;
  const hp=currentWaData.hp.toString().replace(/\D/g,'');
  const intl=hp.startsWith('0')?'62'+hp.slice(1):hp;
  const text=document.getElementById('modal-template').textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      const t=document.getElementById('copy-toast');
      t.textContent='\u2705 Template disalin! Membuka WhatsApp...';
      t.style.display='block';
      setTimeout(()=>{t.style.display='none';},3000);
    });
  }
  window.open('https://wa.me/'+intl,'_blank');
}

document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
if (SCRIPT_URL) loadData();
</script>
