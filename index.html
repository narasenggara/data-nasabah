<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGI Ibrahim Adjie — Data Gadai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a6b3c;--green-light:#e8f5ee;--green-mid:#2d9e5f;--green-dark:#155a32;
  --gold:#c9930a;--gold-light:#fef9eb;
  --bg:#f0f2f5;--card:#ffffff;--border:#e2e6ea;
  --text:#1a1d21;--muted:#6b7280;
  --danger:#dc2626;--danger-light:#fef2f2;
  --blue:#1d4ed8;--blue-light:#eff6ff;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--green);padding:0 28px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.18)}
.logo-badge{background:#fff;color:var(--green);font-weight:700;font-size:13px;padding:5px 10px;border-radius:6px;letter-spacing:.5px}
header h1{color:#fff;font-size:15px;font-weight:600}
.header-sub{color:rgba(255,255,255,0.55);font-size:13px;margin-left:auto}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:28px 20px}
.top-grid{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}

/* PANEL */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.panel-header h2{font-size:14px;font-weight:700;color:var(--text)}
.panel-header .icon{font-size:16px}
.panel-body{padding:18px}

/* TEXTAREA */
textarea{width:100%;height:180px;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;font-family:'Fira Mono',monospace;font-size:11.5px;color:var(--text);background:#fafbfc;resize:vertical;transition:border-color .15s;line-height:1.65}
textarea:focus{outline:none;border-color:var(--green-mid);background:#fff}

.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-green{background:var(--green);color:#fff;width:100%;justify-content:center;margin-top:12px}
.btn-green:hover{background:var(--green-dark)}
.btn-green:disabled{background:#9ca3af;cursor:not-allowed}
.btn-sm{padding:7px 14px;font-size:12px;font-weight:600}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{background:#1ebe5d}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}

/* ERROR / SUCCESS */
.alert{display:none;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:10px}
.alert.show{display:block}
.alert-error{background:var(--danger-light);border:1px solid #fecaca;color:var(--danger)}
.alert-success{background:var(--green-light);border:1px solid #a8d8b8;color:var(--green-dark)}

/* PARSED PREVIEW */
.preview-grid{display:flex;flex-direction:column;gap:6px}
.prow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.prow:last-child{border-bottom:none}
.prow .lbl{color:var(--muted);flex-shrink:0;min-width:100px}
.prow .val{font-weight:600;text-align:right;color:var(--text);font-size:12px}
.val-green{color:var(--green)!important;font-size:13px!important}

/* TABLE */
.table-wrap{overflow-x:auto;margin-top:0}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--green-light);border-bottom:2px solid #c6e8d4}
th{padding:10px 12px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--green);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafffe}
.td-faktur{font-family:'Fira Mono',monospace;font-size:11.5px;color:var(--muted)}
.td-nama{font-weight:600;color:var(--text)}
.td-hp{color:var(--blue);font-size:12px}
.td-tgl{font-size:12px;color:var(--muted)}

/* WA STATUS BADGE */
.wa-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.wa-belum{background:#fef9eb;color:#92400e;border:1px solid #fcd34d}
.wa-sudah{background:var(--green-light);color:var(--green-dark);border:1px solid #a8d8b8}
.wa-notdaftar{background:#f3f4f6;color:var(--muted);border:1px solid var(--border)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state .eicon{font-size:36px;margin-bottom:10px}
.empty-state p{font-size:13px}

/* LOADING */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:460px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.template-box{background:#fafbfc;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;margin-bottom:14px;max-height:240px;overflow-y:auto}
.modal-actions{display:flex;gap:8px;flex-wrap:wrap}
.modal-actions .btn{flex:1}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}

/* SECTION TITLE */
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* STATS ROW */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.stat-card .s-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.stat-card .s-val{font-size:22px;font-weight:700;color:var(--text)}
.stat-card.green .s-val{color:var(--green)}
.stat-card.gold .s-val{color:var(--gold)}

@media(max-width:760px){
  .top-grid{grid-template-columns:1fr}
  .stats-row .stat-card{min-width:80px}
}
</style>
</head>
<body>

<header>
  <div class="logo-badge">PGI</div>
  <h1>Cabang Ibrahim Adjie</h1>
  <span class="header-sub">Data Gadai 2026</span>
</header>

<div class="container">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card green">
      <div class="s-lbl">Total Gadai</div>
      <div class="s-val" id="stat-total">0</div>
    </div>
    <div class="stat-card gold">
      <div class="s-lbl">Belum di WA</div>
      <div class="s-val" id="stat-belum">0</div>
    </div>
    <div class="stat-card">
      <div class="s-lbl">Sudah di WA</div>
      <div class="s-val" id="stat-sudah">0</div>
    </div>
  </div>

  <div class="top-grid">

    <!-- KIRI: Form Tambah -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <span class="icon">➕</span>
          <h2>Tambah Data Gadai</h2>
        </div>
        <div class="panel-body">
          <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Paste Data Faktur</label>
          <textarea id="rawInput" placeholder="Paste teks data dari sistem gadai di sini..."></textarea>
          <div class="alert alert-error" id="parseError"></div>
          <div class="alert alert-success" id="parseSuccess"></div>

          <!-- PREVIEW parsed -->
          <div id="previewWrap" style="display:none;margin-top:14px">
            <div class="section-title">Preview Data</div>
            <div class="preview-grid" id="previewGrid"></div>
            <button class="btn btn-green" id="btnKirim" onclick="kirimKeSheet()">
              <span>📤</span> Tambah ke Spreadsheet
            </button>
          </div>

          <div id="noPreview">
            <button class="btn btn-green" onclick="parseData()" style="margin-top:0">
              <span>🔍</span> Baca Data
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- KANAN: Daftar Gadai -->
    <div>
      <div class="panel">
        <div class="panel-header" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="icon">📋</span>
            <h2>Daftar Gadai</h2>
          </div>
          <button class="btn btn-outline btn-sm" onclick="loadData()">🔄 Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tgl</th>
                <th>No. Faktur</th>
                <th>Nama</th>
                <th>No. HP</th>
                <th>Status WA</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6"><div class="empty-state"><div class="eicon">📂</div><p>Memuat data...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL FOLLOW UP -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>💬 Follow Up WhatsApp</h3>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">
      Nasabah: <strong id="modal-nama">—</strong> &nbsp;|&nbsp; 📱 <span id="modal-hp">—</span>
    </div>
    <div class="template-box" id="modal-template"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="copyTemplate()">📋 Salin</button>
      <button class="btn btn-wa btn-sm" onclick="kirimWA()" style="flex:2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Kirim ke WhatsApp
      </button>
    </div>
    <div id="copy-toast" style="display:none;text-align:center;font-size:12px;color:var(--green);margin-top:8px;font-weight:600">✅ Template tersalin!</div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNwzUe3Yw5-Q8AJrmDYm-WtqLREC6WWNlAC1Qqn_gZM9cVdpfsJihf3XaIY1gySzvKgQ/exec";
let parsedData = null;
let currentWaData = null;
let allRows = [];

// ---- PARSE ----
function getVal(text, key) {
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].trim() === key && i + 1 < lines.length) {
      const v = lines[i+1].trim();
      if (v) return v;
    }
  }
  return '';
}

function extractTanggal(faktur) {
  // Format: 1 + 4digit + yymmdd + nourut
  // ex: 11484260531002 => 1|1484|260531|002
  if (!faktur || faktur.length < 11) return '';
  const yymmdd = faktur.substring(5, 11);
  const yy = yymmdd.substring(0,2);
  const mm = yymmdd.substring(2,4);
  const dd = yymmdd.substring(4,6);
  return `${dd}/${mm}/20${yy}`;
}

function parseData() {
  const raw = document.getElementById('rawInput').value.trim();
  const errEl = document.getElementById('parseError');
  const sucEl = document.getElementById('parseSuccess');
  errEl.classList.remove('show');
  sucEl.classList.remove('show');

  if (!raw) {
    errEl.textContent = '⚠️ Kolom teks kosong.';
    errEl.classList.add('show');
    return;
  }

  const d = {};
  d.noFaktur  = getVal(raw, 'No. Faktur');
  d.noAnggota = getVal(raw, 'No. Anggota');
  d.nama      = getVal(raw, 'Nama');
  d.noHp      = getVal(raw, 'No. Handphone');
  d.alamat    = getVal(raw, 'Alamat');
  d.tgl       = extractTanggal(d.noFaktur);

  if (!d.nama || !d.noFaktur) {
    errEl.textContent = '⚠️ Data tidak lengkap. Pastikan format teks sesuai.';
    errEl.classList.add('show');
    return;
  }

  parsedData = d;

  // Render preview
  document.getElementById('previewGrid').innerHTML = `
    <div class="prow"><span class="lbl">Tanggal</span><span class="val val-green">${d.tgl||'—'}</span></div>
    <div class="prow"><span class="lbl">No. Faktur</span><span class="val">${d.noFaktur||'—'}</span></div>
    <div class="prow"><span class="lbl">No. Anggota</span><span class="val">${d.noAnggota||'—'}</span></div>
    <div class="prow"><span class="lbl">Nama</span><span class="val">${d.nama||'—'}</span></div>
    <div class="prow"><span class="lbl">No. HP</span><span class="val">${d.noHp||'—'}</span></div>
    <div class="prow"><span class="lbl">Alamat</span><span class="val">${d.alamat||'—'}</span></div>
  `;
  document.getElementById('previewWrap').style.display = 'block';
  document.getElementById('noPreview').style.display = 'none';
  sucEl.textContent = '✅ Data berhasil dibaca. Cek preview lalu klik Tambah.';
  sucEl.classList.add('show');
}

// ---- KIRIM KE SHEET ----
async function kirimKeSheet() {
  if (!parsedData) return;
  const btn = document.getElementById('btnKirim');
  const errEl = document.getElementById('parseError');
  const sucEl = document.getElementById('parseSuccess');
  errEl.classList.remove('show');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Mengirim...';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(parsedData)
    });
    const json = await res.json();
    if (json.status === 'ok') {
      sucEl.textContent = `✅ Data ${parsedData.nama} berhasil ditambahkan ke spreadsheet!`;
      sucEl.classList.add('show');
      // Reset form
      document.getElementById('rawInput').value = '';
      document.getElementById('previewWrap').style.display = 'none';
      document.getElementById('noPreview').style.display = 'block';
      parsedData = null;
      // Reload table
      loadData();
    } else {
      throw new Error('Respons tidak OK');
    }
  } catch(e) {
    errEl.textContent = '❌ Gagal mengirim. Cek koneksi atau Apps Script URL.';
    errEl.classList.add('show');
  }

  btn.disabled = false;
  btn.innerHTML = '<span>📤</span> Tambah ke Spreadsheet';
}

// ---- LOAD DATA ----
function loadData() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="eicon">⏳</div><p>Memuat data...</p></div></td></tr>';
  
  window._loadCallback = function(json) {
    allRows = json.data || [];
    renderTable(allRows);
    updateStats(allRows);
    document.getElementById('_jsonp')?.remove();
  };

  const s = document.createElement('script');
  s.id = '_jsonp';
  s.src = SCRIPT_URL + '?callback=_loadCallback';
  s.onerror = () => {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="eicon">❌</div><p>Gagal memuat data.</p></div></td></tr>';
  };
  document.body.appendChild(s);
}

function updateStats(rows) {
  const data = rows.slice(1); // skip header
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-belum').textContent = data.filter(r => (r[9]||'').toString().toLowerCase().includes('belum')).length;
  document.getElementById('stat-sudah').textContent = data.filter(r => (r[9]||'').toString().toLowerCase().includes('sudah')).length;
}

function renderTable(rows) {
  const tbody = document.getElementById('tableBody');
  const data = rows.slice(1); // skip header row
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="eicon">📂</div><p>Belum ada data gadai.</p></div></td></tr>';
    return;
  }
  // Show newest first
  const reversed = [...data].reverse();
  tbody.innerHTML = reversed.map((row, i) => {
    const tgl     = row[0] || '—';
    const faktur  = row[1] || '—';
    const anggota = row[2] || '';
    const nama    = row[3] || '—';
    const hp      = row[4] || '—';
    const alamat  = row[6] || '';
    const waStatus= (row[9] || 'Belum di WA').toString();

    let badgeClass = 'wa-belum';
    if (waStatus.toLowerCase().includes('sudah')) badgeClass = 'wa-sudah';
    else if (waStatus.toLowerCase().includes('tidak')) badgeClass = 'wa-notdaftar';

    return `<tr>
      <td class="td-tgl">${tgl}</td>
      <td class="td-faktur">${faktur}</td>
      <td class="td-nama">${nama}</td>
      <td class="td-hp">${hp}</td>
      <td><span class="wa-badge ${badgeClass}">${waStatus}</span></td>
      <td>
        <button class="btn btn-wa btn-sm" onclick="openFollowUp('${escHtml(nama)}','${escHtml(hp)}')">
          💬 Follow Up
        </button>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(str) {
  return (str||'').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ---- MODAL FOLLOW UP ----
function openFollowUp(nama, hp) {
  currentWaData = { nama, hp };
  document.getElementById('modal-nama').textContent = nama;
  document.getElementById('modal-hp').textContent = hp;
  const template = `Hai Kak ${nama}, terima kasih sudah melakukan gadai di PGI Cabang Ibrahim Adjie🙏\n\nSemoga dana yang diterima bisa membantu kebutuhan Kakak ya 😊\nJika ada pertanyaan terkait perpanjangan atau pelunasan, silakan hubungi kami kapan saja melalui chat ini.\n\nJika ada teman atau keluarga yang membutuhkan dana cepat, boleh direkomendasikan ke PGI Cabang Ibrahim Adjie di :\n📍Jl. Ibrahim Adjie No.296, Binong, Kec. Batununggal, Kota Bandung, Jawa Barat 40275\n\nTerima kasih atas kepercayaannya. 🙏🏻☺️`;
  document.getElementById('modal-template').textContent = template;
  document.getElementById('copy-toast').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  currentWaData = null;
}

function copyTemplate() {
  const text = document.getElementById('modal-template').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('copy-toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  });
}

function kirimWA() {
  if (!currentWaData) return;
  const hp = currentWaData.hp.replace(/\D/g,'');
  const intl = hp.startsWith('0') ? '62' + hp.slice(1) : hp;
  const text = document.getElementById('modal-template').textContent;
  window.open(`https://wa.me/${intl}?text=${encodeURIComponent(text)}`, '_blank');
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ---- INIT ----
loadData();
</script>
</body>
</html>
